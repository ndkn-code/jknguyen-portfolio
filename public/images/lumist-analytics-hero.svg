<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="16" fill="#f8f9ff"/>
  <!-- Card background -->
  <rect x="40" y="30" width="720" height="300" rx="16" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Title -->
  <text x="70" y="70" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#283057">Monthly Active Users</text>
  <text x="70" y="92" font-family="system-ui, sans-serif" font-size="13" fill="#555d86">MAU trend over time</text>
  <!-- Grid lines -->
  <line x1="70" y1="120" x2="730" y2="120" stroke="#f0f0f5" stroke-width="1"/>
  <line x1="70" y1="160" x2="730" y2="160" stroke="#f0f0f5" stroke-width="1"/>
  <line x1="70" y1="200" x2="730" y2="200" stroke="#f0f0f5" stroke-width="1"/>
  <line x1="70" y1="240" x2="730" y2="240" stroke="#f0f0f5" stroke-width="1"/>
  <line x1="70" y1="280" x2="730" y2="280" stroke="#f0f0f5" stroke-width="1"/>
  <!-- Bars -->
  <rect x="110" y="240" width="60" height="60" rx="6" fill="#c7d2fe"/>
  <rect x="200" y="220" width="60" height="80" rx="6" fill="#a5b4fc"/>
  <rect x="290" y="195" width="60" height="105" rx="6" fill="#818cf8"/>
  <rect x="380" y="170" width="60" height="130" rx="6" fill="#6366f1"/>
  <rect x="470" y="150" width="60" height="150" rx="6" fill="#4f46e5"/>
  <rect x="560" y="135" width="60" height="165" rx="6" fill="#4338ca"/>
  <rect x="650" y="115" width="60" height="185" rx="6" fill="#2f4fdd"/>
  <!-- Bar labels -->
  <text x="140" y="232" font-family="system-ui" font-size="11" fill="#2f4fdd" text-anchor="middle" font-weight="600">350</text>
  <text x="230" y="212" font-family="system-ui" font-size="11" fill="#2f4fdd" text-anchor="middle" font-weight="600">420</text>
  <text x="320" y="187" font-family="system-ui" font-size="11" fill="#2f4fdd" text-anchor="middle" font-weight="600">580</text>
  <text x="410" y="162" font-family="system-ui" font-size="11" fill="#2f4fdd" text-anchor="middle" font-weight="600">820</text>
  <text x="500" y="142" font-family="system-ui" font-size="11" fill="#2f4fdd" text-anchor="middle" font-weight="600">950</text>
  <text x="590" y="127" font-family="system-ui" font-size="11" fill="#2f4fdd" text-anchor="middle" font-weight="600">1,150</text>
  <text x="680" y="107" font-family="system-ui" font-size="11" fill="#2f4fdd" text-anchor="middle" font-weight="600">1,350</text>
  <!-- Month labels -->
  <text x="140" y="310" font-family="system-ui" font-size="12" fill="#555d86" text-anchor="middle">Jan</text>
  <text x="230" y="310" font-family="system-ui" font-size="12" fill="#555d86" text-anchor="middle">Feb</text>
  <text x="320" y="310" font-family="system-ui" font-size="12" fill="#555d86" text-anchor="middle">Mar</text>
  <text x="410" y="310" font-family="system-ui" font-size="12" fill="#555d86" text-anchor="middle">Apr</text>
  <text x="500" y="310" font-family="system-ui" font-size="12" fill="#555d86" text-anchor="middle">May</text>
  <text x="590" y="310" font-family="system-ui" font-size="12" fill="#555d86" text-anchor="middle">Jun</text>
  <text x="680" y="310" font-family="system-ui" font-size="12" fill="#555d86" text-anchor="middle">Jul</text>
  <!-- KPI Cards -->
  <rect x="100" y="345" width="180" height="45" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="115" y="365" font-family="system-ui" font-size="10" fill="#555d86">AVERAGE DAU</text>
  <text x="115" y="382" font-family="system-ui" font-size="16" font-weight="bold" fill="#283057">137</text>
  <text x="155" y="382" font-family="system-ui" font-size="10" fill="#22c55e">↑ 0.6%</text>
  <rect x="310" y="345" width="180" height="45" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="325" y="365" font-family="system-ui" font-size="10" fill="#555d86">MRR</text>
  <text x="325" y="382" font-family="system-ui" font-size="16" font-weight="bold" fill="#283057">$2.3K</text>
  <text x="380" y="382" font-family="system-ui" font-size="10" fill="#22c55e">↑ 23.8%</text>
  <rect x="520" y="345" width="180" height="45" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="535" y="365" font-family="system-ui" font-size="10" fill="#555d86">FEATURE USAGE</text>
  <text x="535" y="382" font-family="system-ui" font-size="16" font-weight="bold" fill="#22c55e">+4x</text>
</svg>
